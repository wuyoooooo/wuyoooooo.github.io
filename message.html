<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="nav">
    <div class="nav-logo">我的春日主页</div>
    <div class="nav-list">
      <a href="index.html" class="nav-item">首页</a>
      <a href="interest.html" class="nav-item">我的兴趣</a>
      <a href="daily.html" class="nav-item">日常经历</a>
      <a href="share.html" class="nav-item">生活分享</a>
      <div class="nav-item active">留言板</div>
    </div>
    <div class="hamburger">☰</div>
  </nav>
  <div class="mobile-menu">
    <a href="index.html" class="nav-item">首页</a>
    <a href="interest.html" class="nav-item">我的兴趣</a>
    <a href="daily.html" class="nav-item">日常经历</a>
    <a href="share.html" class="nav-item">生活分享</a>
    <a href="message.html" class="nav-item active">留言板</a>
    <a href="about.html" class="nav-item">关于我</a>
  </div>

  <div class="container" style="padding-top: 120px;">
    <h2 class="title-h2">💬 留言板</h2>
    <div class="divider"></div>

    <div class="grid-12">
      <div class="card" style="grid-column: span 12; padding: 32px;">
        <h3 class="title-h3" style="margin-bottom: 24px; text-align: center;">留下你的足迹吧~</h3>
        <form id="messageForm" onsubmit="submitMessage(event)">
          <div class="form-group">
            <label class="form-label">你的昵称</label>
            <input type="text" class="form-input" required>
            <div class="form-error">请输入昵称</div>
          </div>
          <div class="form-group">
            <label class="form-label">留言内容</label>
            <textarea class="form-textarea" required></textarea>
            <div class="form-error">请输入留言内容</div>
          </div>
          <div style="display: flex; justify-content: center; margin-top: 16px;">
            <button type="submit" class="btn btn-main">提交留言</button>
          </div>
        </form>
      </div>
      <div class="card" style="grid-column: span 12; padding: 32px;">
        <h3 class="title-h3" style="margin-bottom: 16px;">留言列表</h3>
        <div id="messageList" class="text-main">暂无留言，快来写下第一条吧~</div>
      </div>
    </div>
  </div>

  <footer class="footer">© 2026 我的春日个人主页 | 所有内容均为个人分享</footer>
  <script src="js/main.js"></script>
  <script>
    function submitMessage(e) {
      e.preventDefault();
      const form = e.target;
      if(!validateForm(form)) return;
      showToast("留言成功！", "success");
      form.reset();
    }
  </script>
</body>
</html>
