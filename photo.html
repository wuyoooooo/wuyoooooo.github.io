<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍照 | 春日微风</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="navbar" id="navbar">
    <div class="logo" onclick="location.href='index.html'">🌿 我的春日主页</div>
    <div class="nav-links">
        <a href="index.html" class="nav-link">首页</a>
        <a href="interest.html" class="nav-link active">我的兴趣</a>
        <a href="daily.html" class="nav-link">日常经历</a>
        <a href="share.html" class="nav-link">生活分享</a>
        <a href="message.html" class="nav-link">留言板</a>
        <a href="about.html" class="nav-link">关于我</a>
    </div>
    <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
</div>
<div class="mobile-menu" id="mobileMenu">
    <a href="index.html">首页</a><a href="interest.html">我的兴趣</a><a href="daily.html">日常经历</a>
    <a href="share.html">生活分享</a><a href="message.html">留言板</a><a href="about.html">关于我</a>
</div>

<div class="container">
    <div class="flex-between" style="margin-top:100px;">
        <span class="back-btn" onclick="location.href='interest.html'"><i class="fas fa-arrow-left"></i> 返回兴趣总页</span>
        <button class="btn-primary" id="openAddBtn">+ 添加照片</button>
    </div>
    <h2 style="text-align:center; margin:30px 0 20px;">📷 春日拍照合集</h2>
    <div id="itemsContainer" class="waterfall"></div>
</div>
<footer>© 2026 春日微风</footer>

<!-- 添加弹窗 -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>✨ 添加照片</h3>
        <div class="form-group"><input id="photoImg" placeholder="图片URL *"></div>
        <div class="form-group"><input id="photoDate" type="date" placeholder="拍照日期"></div>
        <div class="form-group"><input id="photoNote" placeholder="备注（不超过50字）"></div>
        <div style="display:flex; gap:16px; justify-content:flex-end;">
            <button id="submitBtn" class="btn-primary">提交</button>
            <button id="cancelBtn" style="background:#fff; border:1px solid #ccc;">取消</button>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    const STORAGE_KEY = 'spring_photo';
    function render() {
        const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const container = document.getElementById('itemsContainer');
        if (!container) return;
        if (list.length === 0) {
            container.innerHTML = '<div style="text-align:center;">暂无照片，点击添加～</div>';
            return;
        }
        container.innerHTML = list.map(item => `
            <div class="waterfall-item" style="position:relative;">
                <div class="card" style="padding:0; overflow:hidden;">
                    <img src="${item.img}" style="width:100%; display:block;">
                    <div style="background:rgba(0,0,0,0.6); color:white; padding:8px; text-align:center;">
                        📅 ${item.date}<br>${escapeHtml(item.note || '')}
                    </div>
                </div>
                <span class="delete-item" data-id="${item.id}" style="position:absolute; top:8px; right:8px; background:white; border-radius:50%; padding:4px; cursor:pointer;">🗑️</span>
            </div>
        `).join('');
        document.querySelectorAll('.delete-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm('确定删除这张照片吗？')) {
                    const id = btn.dataset.id;
                    let newList = JSON.parse(localStorage.getItem(STORAGE_KEY)).filter(i => i.id != id);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(newList));
                    render();
                    showToast('删除成功');
                }
            });
        });
    }
    document.getElementById('openAddBtn').addEventListener('click', () => openModal('addModal'));
    document.getElementById('cancelBtn').addEventListener('click', () => closeModal('addModal'));
    document.getElementById('submitBtn').addEventListener('click', () => {
        let img = document.getElementById('photoImg').value.trim();
        let date = document.getElementById('photoDate').value;
        let note = document.getElementById('photoNote').value.trim();
        if (!img || !date) { showToast('请填写图片URL和日期'); return; }
        let list = JSON.parse(localStorage.getItem(STORAGE_KEY));
        list.push({ id: Date.now().toString(), img, date, note });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        closeModal('addModal');
        render();
        showToast('添加成功');
        document.getElementById('photoImg').value = '';
        document.getElementById('photoDate').value = '';
        document.getElementById('photoNote').value = '';
    });
    render();
</script>
</body>
</html>
