  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="nav">
    <div class="nav-logo">我的春日主页</div>
    <div class="nav-list">
      <div class="nav-item active">首页</div>
      <a href="interest.html" class="nav-item">我的兴趣</a>
      <a href="daily.html" class="nav-item">日常经历</a>
      <a href="share.html" class="nav-item">生活分享</a>
      <a href="message.html" class="nav-item">留言板</a>
    </div>
    <div class="hamburger">☰</div>
  </nav>
  <div class="mobile-menu">
    <a href="index.html" class="nav-item">首页</a>
    <a href="interest.html" class="nav-item">我的兴趣</a>
    <a href="daily.html" class="nav-item">日常经历</a>
    <a href="share.html" class="nav-item">生活分享</a>
    <a href="message.html" class="nav-item">留言板</a>
    <a href="about.html" class="nav-item">关于我</a>
  </div>

  <!-- Banner -->
  <div class="container" style="padding-top: 120px;">
    <div style="height: 400px; background: linear-gradient(#F8FFFB, rgba(168,230,207,0.3)); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius-card);">
      <div class="avatar" style="width: 180px; height: 180px; border-radius: 50%; border: 3px solid var(--main); box-shadow: var(--shadow-normal); background: url('https://picsum.photos/200/200') center/cover; margin-bottom: 24px;"></div>
      <div class="hand-font" style="font-size: 24px; text-shadow: 0 2px 4px rgba(74,74,74,0.2);">热爱生活，拥抱春日</div>
    </div>

    <!-- 功能卡片 -->
    <div class="grid-12" style="margin-top: 40px;">
      <div class="card" style="grid-column: span 3; height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;" onclick="location.href='interest.html'">
        <div style="font-size: 24px; color: var(--main); margin-bottom: 16px;">🎨</div>
        <div class="hand-font" style="font-size: 20px;">我的兴趣</div>
      </div>
      <div class="card" style="grid-column: span 3; height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;" onclick="location.href='daily.html'">
        <div style="font-size: 24px; color: var(--main); margin-bottom: 16px;">📅</div>
        <div class="hand-font" style="font-size: 20px;">日常经历</div>
      </div>
      <div class="card" style="grid-column: span 3; height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;" onclick="location.href='share.html'">
        <div style="font-size: 24px; color: var(--main); margin-bottom: 16px;">📝</div>
        <div class="hand-font" style="font-size: 20px;">生活分享</div>
      </div>
      <div class="card" style="grid-column: span 3; height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;" onclick="location.href='message.html'">
        <div style="font-size: 24px; color: var(--main); margin-bottom: 16px;">💬</div>
        <div class="hand-font" style="font-size: 20px;">留言板</div>
      </div>
    </div>
  </div>

  <!-- 底部 -->
  <footer class="footer">© 2026 我的春日个人主页 | 所有内容均为个人分享</footer>
