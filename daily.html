<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常经历 | 春日微风</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="navbar" id="navbar">...</div>
<div class="mobile-menu" id="mobileMenu">...</div>

<div class="container">
    <div class="flex-between" style="margin-top:100px;"><h1>📖 日常经历</h1><button id="addDailyBtn" class="btn-primary">+ 添加记录</button></div>
    <div class="vine-divider"></div>
    <div class="timeline-vine" id="timelineContainer"></div>
</div>
<footer>© 2026 春日微风</footer>

<script src="js/main.js"></script>
<script>
    const STORAGE_KEY = 'spring_daily';
    function renderDaily() {
        let list = JSON.parse(localStorage.getItem(STORAGE_KEY)).sort((a,b)=>new Date(b.date)-new Date(a.date));
        const container = document.getElementById('timelineContainer');
        if (list.length === 0) { container.innerHTML = '<div>暂无记录，点击添加～</div>'; return; }
        container.innerHTML = list.map(item => `
            <div class="card" style="margin-bottom:24px; padding:16px; position:relative;">
                <div style="display:flex; justify-content:space-between;"><strong>${item.date}</strong><span class="delete-daily" data-id="${item.id}" style="cursor:pointer;">🗑️</span></div>
                <h3>${escapeHtml(item.title)}</h3>
                <p>${escapeHtml(item.content)}</p>
            </div>
        `).join('');
        document.querySelectorAll('.delete-daily').forEach(el => {
            el.addEventListener('click', () => {
                if(confirm('删除这条日常记录？')) {
                    let id = el.dataset.id;
                    let newList = JSON.parse(localStorage.getItem(STORAGE_KEY)).filter(i=>i.id != id);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(newList));
                    renderDaily();
                    showToast('删除成功');
                }
            });
        });
    }
    document.getElementById('addDailyBtn').addEventListener('click', () => {
        let date = prompt('日期 (YYYY-MM-DD)'); let title = prompt('标题'); let content = prompt('内容');
        if(date && title && content) {
            let list = JSON.parse(localStorage.getItem(STORAGE_KEY));
            list.push({ id: Date.now().toString(), date, title, content });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
            renderDaily();
            showToast('添加成功');
        }
    });
    renderDaily();
</script>
</body>
</html>
